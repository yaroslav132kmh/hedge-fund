# Self-diagnostics, explainability, dashboard and logging.
diagnostic:
  drift_method: psi                 # psi | ks
  drift_threshold: 0.2
  degradation_metric: rmse
  degradation_window: 10
  degradation_threshold: 2.0
  confidence_weights:
    calibration: 0.25
    data_drift: 0.20
    forecast_error: 0.20
    hedge_quality: 0.20
    risk_compliance: 0.15

explainability:
  language: ru
  max_reasons: 6
  decimals: 4

dashboard:
  output_html: artifacts/results/dashboard.html
  output_dir: artifacts/results       # per-language dashboards: dashboard_ru.html / dashboard_en.html
  languages: [ru, en]                 # fully Russian and fully English dashboards
  delta_green_zone: 0.05
  delta_red_zone: 0.15
  height: 2200
  width: 1300
  theme: plotly_dark

logging:
  level: INFO
  console: true
  jsonl: true
  file_name: cryptohedge.jsonl
  timing: true
